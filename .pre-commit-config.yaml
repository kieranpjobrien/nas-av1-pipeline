repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: no-bare-err-detect
        name: reject bare `-err_detect ignore_err` (must be -err_detect:v)
        entry: bash -c 'if grep -rn --include="*.py" "\"-err_detect\", \"ignore_err\"\|'"'"'-err_detect'"'"', '"'"'ignore_err'"'"'" pipeline/ tools/ server/; then exit 1; fi'
        language: system
        pass_filenames: false

      - id: no-optional-audio-map
        name: reject `-map 0:a?` (optional audio map) in ffmpeg cmd literals
        # Only flag the quoted string literal `"0:a?"` / `'0:a?'` — plain mentions
        # inside comments/docstrings (e.g. explaining why we banned it) are fine.
        entry: bash -c 'if grep -rnE --include="*.py" "[\"'"'"']0:a\?[\"'"'"']" pipeline/ tools/ server/; then exit 1; fi'
        language: system
        pass_filenames: false

      - id: no-done-deferred
        name: reject set_file(..., DONE, ...reason=defer/skip)
        entry: python -c "import sys, re, subprocess; diff = subprocess.check_output(['git', 'diff', '--cached']).decode(); sys.exit(1 if re.search(r'set_file\([^)]*DONE[^)]*(deferred|skipped|defer)', diff, re.IGNORECASE) else 0)"
        language: system
        pass_filenames: false
